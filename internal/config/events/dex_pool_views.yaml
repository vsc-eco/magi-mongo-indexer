# ===============================
# DEX POOL VIEWS
# ===============================

views:
  # Pool registry - one row per discovered pool
  - name: dex_pool_registry
    sql: |
      CREATE OR REPLACE VIEW dex_pool_registry AS
      SELECT
        indexer_contract_id AS pool_contract,
        asset0,
        asset1,
        fee_bps,
        indexer_block_height AS init_block,
        indexer_ts AS init_ts
      FROM dex_pool_init_events;

  # Current liquidity per pool (net of adds - removes + swap impact
  # - protocol-fee drain).
  #
  # Contract accounting (see dex-contracts contracts/dex/main.go):
  #   newRIn  = rIn + amountIn              -- entire input enters the pool
  #   newROut = rOut - grossOut + lpFee     -- lpFee stays, magiFee leaves
  # So per swap the reserve changes are:
  #   delta(asset_in)  = + amount_in
  #   delta(asset_out) = - (amount_out + magi_fee)
  # The `amount_out` emitted on the swap event is already the NET amount the
  # recipient receives (grossOut - baseFee - clpFee). The only piece the
  # view was missing was the `magi_fee` portion that permanently leaves the
  # pool to the protocol treasury. Subtracting it per asset here brings the
  # view back into exact agreement with on-chain `r0`/`r1`.
  #
  # Only the 5-field fee log format carries `asset` - legacy 4-field rows
  # have `asset IS NULL` and are ignored in the magi-fee drain (pools with
  # only legacy history still drift, but no worse than before this fix).
  - name: dex_pool_liquidity
    sql: |
      CREATE OR REPLACE VIEW dex_pool_liquidity AS
      WITH adds AS (
        SELECT indexer_contract_id, SUM(amount0) AS total_add0, SUM(amount1) AS total_add1, SUM(lp_minted) AS total_minted
        FROM dex_pool_add_liq_events GROUP BY indexer_contract_id
      ),
      removes AS (
        SELECT indexer_contract_id, SUM(amount0) AS total_rem0, SUM(amount1) AS total_rem1, SUM(lp_burned) AS total_burned
        FROM dex_pool_rem_liq_events GROUP BY indexer_contract_id
      ),
      pool_assets AS (
        SELECT indexer_contract_id, asset0, asset1
        FROM dex_pool_init_events
      ),
      swap_impact AS (
        SELECT
          s.indexer_contract_id,
          SUM(CASE WHEN s.asset_in = p.asset0 THEN s.amount_in ELSE 0 END)
          - SUM(CASE WHEN s.asset_out = p.asset0 THEN s.amount_out ELSE 0 END) AS net0,
          SUM(CASE WHEN s.asset_in = p.asset1 THEN s.amount_in ELSE 0 END)
          - SUM(CASE WHEN s.asset_out = p.asset1 THEN s.amount_out ELSE 0 END) AS net1
        FROM dex_pool_swap_events s
        JOIN pool_assets p ON s.indexer_contract_id = p.indexer_contract_id
        GROUP BY s.indexer_contract_id
      ),
      magi_fee_drain AS (
        SELECT
          f.indexer_contract_id,
          SUM(CASE WHEN f.asset = p.asset0 THEN f.magi_fee ELSE 0 END) AS magi0,
          SUM(CASE WHEN f.asset = p.asset1 THEN f.magi_fee ELSE 0 END) AS magi1
        FROM dex_pool_fee_events f
        JOIN pool_assets p ON f.indexer_contract_id = p.indexer_contract_id
        WHERE f.asset IS NOT NULL
        GROUP BY f.indexer_contract_id
      )
      SELECT
        COALESCE(a.indexer_contract_id, r.indexer_contract_id) AS pool_contract,
        COALESCE(a.total_add0, 0) - COALESCE(r.total_rem0, 0)
          + COALESCE(sw.net0, 0)
          - COALESCE(mf.magi0, 0) AS reserve0,
        COALESCE(a.total_add1, 0) - COALESCE(r.total_rem1, 0)
          + COALESCE(sw.net1, 0)
          - COALESCE(mf.magi1, 0) AS reserve1,
        COALESCE(a.total_minted, 0) - COALESCE(r.total_burned, 0) AS total_lp
      FROM adds a
      FULL OUTER JOIN removes r ON a.indexer_contract_id = r.indexer_contract_id
      LEFT JOIN swap_impact sw ON COALESCE(a.indexer_contract_id, r.indexer_contract_id) = sw.indexer_contract_id
      LEFT JOIN magi_fee_drain mf ON COALESCE(a.indexer_contract_id, r.indexer_contract_id) = mf.indexer_contract_id;

  # LP positions per provider per pool
  - name: dex_pool_lp_positions
    sql: |
      CREATE OR REPLACE VIEW dex_pool_lp_positions AS
      WITH minted AS (
        SELECT indexer_contract_id, provider, SUM(lp_minted) AS total_minted
        FROM dex_pool_add_liq_events GROUP BY indexer_contract_id, provider
      ),
      burned AS (
        SELECT indexer_contract_id, provider, SUM(lp_burned) AS total_burned
        FROM dex_pool_rem_liq_events GROUP BY indexer_contract_id, provider
      )
      SELECT
        COALESCE(m.indexer_contract_id, b.indexer_contract_id) AS pool_contract,
        COALESCE(m.provider, b.provider) AS provider,
        COALESCE(m.total_minted, 0) - COALESCE(b.total_burned, 0) AS lp_balance
      FROM minted m
      FULL OUTER JOIN burned b ON m.indexer_contract_id = b.indexer_contract_id AND m.provider = b.provider;

  # Swap volume - 24h
  - name: dex_pool_volume_24h
    sql: |
      CREATE OR REPLACE VIEW dex_pool_volume_24h AS
      SELECT
        indexer_contract_id AS pool_contract,
        COUNT(*) AS swap_count,
        SUM(amount_in) AS total_volume_in,
        SUM(amount_out) AS total_volume_out
      FROM dex_pool_swap_events
      WHERE indexer_ts > NOW() - INTERVAL '24 hours'
      GROUP BY indexer_contract_id;

  # Swap volume - 7d
  - name: dex_pool_volume_7d
    sql: |
      CREATE OR REPLACE VIEW dex_pool_volume_7d AS
      SELECT
        indexer_contract_id AS pool_contract,
        COUNT(*) AS swap_count,
        SUM(amount_in) AS total_volume_in,
        SUM(amount_out) AS total_volume_out
      FROM dex_pool_swap_events
      WHERE indexer_ts > NOW() - INTERVAL '7 days'
      GROUP BY indexer_contract_id;

  # Swap volume - 30d
  - name: dex_pool_volume_30d
    sql: |
      CREATE OR REPLACE VIEW dex_pool_volume_30d AS
      SELECT
        indexer_contract_id AS pool_contract,
        COUNT(*) AS swap_count,
        SUM(amount_in) AS total_volume_in,
        SUM(amount_out) AS total_volume_out
      FROM dex_pool_swap_events
      WHERE indexer_ts > NOW() - INTERVAL '30 days'
      GROUP BY indexer_contract_id;

  # Swap volume - all time
  - name: dex_pool_volume_all
    sql: |
      CREATE OR REPLACE VIEW dex_pool_volume_all AS
      SELECT
        indexer_contract_id AS pool_contract,
        COUNT(*) AS swap_count,
        SUM(amount_in) AS total_volume_in,
        SUM(amount_out) AS total_volume_out
      FROM dex_pool_swap_events
      GROUP BY indexer_contract_id;

  # Fees earned - 24h
  - name: dex_pool_fees_24h
    sql: |
      CREATE OR REPLACE VIEW dex_pool_fees_24h AS
      SELECT
        indexer_contract_id AS pool_contract,
        SUM(total_fee) AS total_fees,
        SUM(magi_fee) AS protocol_fees,
        SUM(lp_fee) AS lp_fees
      FROM dex_pool_fee_events
      WHERE indexer_ts > NOW() - INTERVAL '24 hours'
      GROUP BY indexer_contract_id;

  # Fees earned - 7d
  - name: dex_pool_fees_7d
    sql: |
      CREATE OR REPLACE VIEW dex_pool_fees_7d AS
      SELECT
        indexer_contract_id AS pool_contract,
        SUM(total_fee) AS total_fees,
        SUM(magi_fee) AS protocol_fees,
        SUM(lp_fee) AS lp_fees
      FROM dex_pool_fee_events
      WHERE indexer_ts > NOW() - INTERVAL '7 days'
      GROUP BY indexer_contract_id;

  # Fees earned - 30d
  - name: dex_pool_fees_30d
    sql: |
      CREATE OR REPLACE VIEW dex_pool_fees_30d AS
      SELECT
        indexer_contract_id AS pool_contract,
        SUM(total_fee) AS total_fees,
        SUM(magi_fee) AS protocol_fees,
        SUM(lp_fee) AS lp_fees
      FROM dex_pool_fee_events
      WHERE indexer_ts > NOW() - INTERVAL '30 days'
      GROUP BY indexer_contract_id;

  # Fees earned - all time
  - name: dex_pool_fees_all
    sql: |
      CREATE OR REPLACE VIEW dex_pool_fees_all AS
      SELECT
        indexer_contract_id AS pool_contract,
        SUM(total_fee) AS total_fees,
        SUM(magi_fee) AS protocol_fees,
        SUM(lp_fee) AS lp_fees
      FROM dex_pool_fee_events
      GROUP BY indexer_contract_id;

  # Fees earned per asset - all time. `asset` is only populated for fee logs
  # emitted in the 5-field format; legacy rows (asset NULL) are excluded so
  # the per-asset breakdown stays clean.
  - name: dex_pool_fees_by_asset
    sql: |
      CREATE OR REPLACE VIEW dex_pool_fees_by_asset AS
      SELECT
        indexer_contract_id AS pool_contract,
        asset,
        SUM(total_fee) AS total_fees,
        SUM(magi_fee) AS protocol_fees,
        SUM(lp_fee) AS lp_fees
      FROM dex_pool_fee_events
      WHERE asset IS NOT NULL
      GROUP BY indexer_contract_id, asset;

  # Recent swaps (last 100)
  - name: dex_pool_recent_swaps
    sql: |
      CREATE OR REPLACE VIEW dex_pool_recent_swaps AS
      SELECT
        s.indexer_contract_id AS pool_contract,
        s.asset_in,
        s.asset_out,
        s.amount_in,
        s.amount_out,
        s.recipient,
        s.indexer_tx_hash AS tx_hash,
        s.indexer_block_height AS block_height,
        s.indexer_ts AS ts
      FROM dex_pool_swap_events s
      ORDER BY s.indexer_block_height DESC
      LIMIT 100;
