  - name: okinoko_dao_project_overview
    sql: |
      CREATE OR REPLACE VIEW okinoko_dao_project_overview AS
      WITH project_meta_ranked AS (
        SELECT
          project_id,
          field,
          new_value,
          ROW_NUMBER() OVER (
            PARTITION BY project_id, field
            ORDER BY indexer_block_height DESC
          ) AS rn
        FROM okinoko_dao_proposal_meta_events
        WHERE proposal_id IS NULL
          OR proposal_id = 0
      ),
      project_meta AS (
        SELECT
          project_id,
          MAX(CASE WHEN field = 'name' AND rn = 1 THEN new_value END) AS name,
          MAX(CASE WHEN field = 'description' AND rn = 1 THEN new_value END) AS description,
          MAX(CASE WHEN field = 'metadata' AND rn = 1 THEN new_value END) AS metadata,
          MAX(CASE WHEN field = 'url' AND rn = 1 THEN new_value END) AS url,
          MAX(CASE WHEN field = 'fundsAsset' AND rn = 1 THEN new_value END) AS funds_asset,
          MAX(CASE WHEN field = 'votingSystem' AND rn = 1 THEN new_value END) AS voting_system,
          MAX(CASE WHEN field = 'thresholdPercent' AND rn = 1 THEN new_value END) AS threshold_percent,
          MAX(CASE WHEN field = 'quorumPercent' AND rn = 1 THEN new_value END) AS quorum_percent,
          MAX(CASE WHEN field = 'proposalDurationHours' AND rn = 1 THEN new_value END) AS proposal_duration_hours,
          MAX(CASE WHEN field = 'executionDelayHours' AND rn = 1 THEN new_value END) AS execution_delay_hours,
          MAX(CASE WHEN field = 'leaveCooldownHours' AND rn = 1 THEN new_value END) AS leave_cooldown_hours,
          MAX(CASE WHEN field = 'proposalCost' AND rn = 1 THEN new_value END) AS proposal_cost,
          MAX(CASE WHEN field = 'stakeMinAmount' AND rn = 1 THEN new_value END) AS stake_min_amount,
          MAX(CASE WHEN field = 'membershipContract' AND rn = 1 THEN new_value END) AS membership_contract,
          MAX(CASE WHEN field = 'membershipFunction' AND rn = 1 THEN new_value END) AS membership_function,
          MAX(CASE WHEN field = 'membershipNFT' AND rn = 1 THEN new_value END) AS membership_nft,
          MAX(CASE WHEN field = 'membershipPayload' AND rn = 1 THEN new_value END) AS membership_payload,
          MAX(CASE WHEN field = 'proposalsMembersOnly' AND rn = 1 THEN new_value END) AS proposals_members_only
        FROM project_meta_ranked
        GROUP BY project_id
      )
      SELECT
        pc.project_id,
        pc.created_by,
        COALESCE(pm.name, pc.name) AS name,
        COALESCE(pm.description, pc.description) AS description,
        COALESCE(pm.metadata, pc.metadata) AS metadata,
        COALESCE(pm.url, pc.url) AS url,
        COALESCE(pm.funds_asset, pc.funds_asset) AS funds_asset,
        COALESCE(pm.voting_system, pc.voting_system) AS voting_system,
        COALESCE(NULLIF(pm.threshold_percent, '')::numeric, pc.threshold_percent) AS threshold_percent,
        COALESCE(NULLIF(pm.quorum_percent, '')::numeric, pc.quorum_percent) AS quorum_percent,
        COALESCE(NULLIF(pm.proposal_duration_hours, '')::numeric, pc.proposal_duration_hours) AS proposal_duration_hours,
        COALESCE(NULLIF(pm.execution_delay_hours, '')::numeric, pc.execution_delay_hours) AS execution_delay_hours,
        COALESCE(NULLIF(pm.leave_cooldown_hours, '')::numeric, pc.leave_cooldown_hours) AS leave_cooldown_hours,
        COALESCE(NULLIF(pm.proposal_cost, '')::numeric, pc.proposal_cost) AS proposal_cost,
        COALESCE(NULLIF(pm.stake_min_amount, '')::numeric, pc.stake_min_amount) AS stake_min_amount,
        COALESCE(
          CASE
            WHEN pm.proposals_members_only IS NULL THEN NULL
            ELSE NULLIF(pm.proposals_members_only, '')::boolean
          END,
          pc.proposals_members_only
        ) AS proposals_members_only,
        ml.member,
        COALESCE(ml.active, false) AS active,
        ml.last_action,
        ml.last_event_block,
        member_lists.active_members,
        member_lists.members,
        COALESCE(pm.membership_contract, pc.membership_contract) AS membership_contract,
        COALESCE(pm.membership_function, pc.membership_function) AS membership_function,
        COALESCE(pm.membership_nft, pc.membership_nft) AS membership_nft,
        COALESCE(pm.membership_payload, pc.membership_payload) AS membership_payload
      FROM okinoko_dao_project_created_events pc
      LEFT JOIN project_meta pm ON pc.project_id = pm.project_id
      LEFT JOIN okinoko_dao_membership_latest ml
        ON pc.project_id = ml.project_id
      LEFT JOIN LATERAL (
        SELECT
          ARRAY(
            SELECT ml.member
            FROM okinoko_dao_membership_latest ml
            WHERE ml.project_id = pc.project_id
              AND ml.active = true
            ORDER BY ml.member
          ) AS active_members,
          ARRAY(
            SELECT ml.member
            FROM okinoko_dao_membership_latest ml
            WHERE ml.project_id = pc.project_id
            ORDER BY ml.member
          ) AS members
      ) AS member_lists ON TRUE;

  - name: okinoko_dao_proposal_overview
    sql: |
      CREATE OR REPLACE VIEW okinoko_dao_proposal_overview AS
      SELECT
        ps.project_id,
        ps.proposal_id,
        ps.name,
        ps.description,
        ps.metadata,
        ps.options,
        ps.payouts,
        ps.outcome_meta,
        ps.duration_hours,
        ps.is_poll,
        ps.created_by,
        ps.state,
        ps.state_block,
        ps.ready_at,
        ps.ready_block,
        ps.result,
        ps.result_block,
        ml.member,
        COALESCE(ml.active, false) AS member_active,
        ml.last_action,
        ml.last_event_block,
        member_lists.active_members,
        member_lists.members,
        ps.url
      FROM okinoko_dao_proposal_summary ps
      LEFT JOIN okinoko_dao_membership_latest ml
        ON ps.project_id = ml.project_id
      LEFT JOIN LATERAL (
        SELECT
          ARRAY(
            SELECT ml.member
            FROM okinoko_dao_membership_latest ml
            WHERE ml.project_id = ps.project_id
              AND ml.active = true
            ORDER BY ml.member
          ) AS active_members,
          ARRAY(
            SELECT ml.member
            FROM okinoko_dao_membership_latest ml
            WHERE ml.project_id = ps.project_id
            ORDER BY ml.member
          ) AS members
      ) AS member_lists ON TRUE;

  # Proposal created events expanded with active members (one row per member)
  - name: okinoko_dao_proposal_created_with_members
    sql: |
      CREATE OR REPLACE VIEW okinoko_dao_proposal_created_with_members AS
      SELECT
        pc.project_id,
        pc.proposal_id,
        pc.created_by,
        pc.name,
        pc.indexer_block_height,
        ml.member AS member
      FROM okinoko_dao_proposal_created_events pc
      LEFT JOIN okinoko_dao_membership_latest ml
        ON ml.project_id = pc.project_id
       AND ml.active = TRUE;

  # Proposal result events expanded with active members (one row per member)
  - name: okinoko_dao_proposal_result_with_members
    sql: |
      CREATE OR REPLACE VIEW okinoko_dao_proposal_result_with_members AS
      SELECT
        pr.project_id,
        pr.proposal_id,
        pr.result,
        pr.indexer_block_height,
        ml.member AS member
      FROM okinoko_dao_proposal_result_events pr
      LEFT JOIN okinoko_dao_membership_latest ml
        ON ml.project_id = pr.project_id
       AND ml.active = TRUE;
