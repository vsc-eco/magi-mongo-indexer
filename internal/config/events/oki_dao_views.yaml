  - name: okinoko_dao_membership_latest
    sql: |
      CREATE OR REPLACE VIEW okinoko_dao_membership_latest AS
      WITH membership_events AS (
        SELECT project_id, member, true AS joined, indexer_block_height
        FROM okinoko_dao_member_joined_events
        UNION ALL
        SELECT project_id, member, false AS joined, indexer_block_height
        FROM okinoko_dao_member_left_events
      ),
      ranked AS (
        SELECT
          project_id,
          member,
          joined,
          indexer_block_height,
          ROW_NUMBER() OVER (
            PARTITION BY project_id, member
            ORDER BY indexer_block_height DESC
          ) AS rn
        FROM membership_events
      )
      SELECT
        project_id,
        member,
        joined AS active,
        CASE WHEN joined THEN 'joined' ELSE 'left' END AS last_action,
        indexer_block_height AS last_event_block
      FROM ranked
      WHERE rn = 1;

  - name: okinoko_dao_treasury_movements
    sql: |
      CREATE OR REPLACE VIEW okinoko_dao_treasury_movements AS
      SELECT
        'in' AS direction,
        project_id,
        added_by AS account,
        amount,
        asset,
        to_stake AS stake_related,
        indexer_block_height
      FROM okinoko_dao_funds_added_events

      UNION ALL

      SELECT
        'out' AS direction,
        project_id,
        to_address AS account,
        amount,
        asset,
        from_stake AS stake_related,
        indexer_block_height
      FROM okinoko_dao_funds_removed_events;

  - name: okinoko_dao_stake_balances
    sql: |
      CREATE OR REPLACE VIEW okinoko_dao_stake_balances AS
      WITH stake_movements AS (
        SELECT
          project_id,
          added_by AS account,
          asset,
          amount,
          to_stake AS stake_related,
          indexer_block_height
        FROM okinoko_dao_funds_added_events
        UNION ALL
        SELECT
          project_id,
          to_address AS account,
          asset,
          -amount AS amount,
          from_stake AS stake_related,
          indexer_block_height
        FROM okinoko_dao_funds_removed_events
      )
      SELECT
        project_id,
        account,
        asset,
        SUM(amount) AS stake_amount
      FROM stake_movements
      WHERE stake_related = true
      GROUP BY project_id, account, asset;

  - name: okinoko_dao_proposal_latest_state
    sql: |
      CREATE OR REPLACE VIEW okinoko_dao_proposal_latest_state AS
      WITH ranked AS (
        SELECT
          proposal_id,
          state,
          indexer_block_height,
          ROW_NUMBER() OVER (
            PARTITION BY proposal_id
            ORDER BY indexer_block_height DESC
          ) AS rn
        FROM okinoko_dao_proposal_state_events
      )
      SELECT
        proposal_id,
        state,
        indexer_block_height AS state_block
      FROM ranked
      WHERE rn = 1;

  - name: okinoko_dao_proposal_summary
    sql: |
      CREATE OR REPLACE VIEW okinoko_dao_proposal_summary AS
      WITH creation AS (
        SELECT
          proposal_id,
          project_id,
          created_by,
          name,
          description,
          metadata,
          options,
          payouts,
          outcome_meta,
          duration_hours,
          is_poll,
          indexer_block_height AS created_block,
          url
        FROM okinoko_dao_proposal_created_events
      ),
      proposal_meta_ranked AS (
        SELECT
          project_id,
          proposal_id,
          field,
          new_value,
          ROW_NUMBER() OVER (
            PARTITION BY proposal_id, field
            ORDER BY indexer_block_height DESC
          ) AS rn
        FROM okinoko_dao_proposal_meta_events
        WHERE proposal_id IS NOT NULL
          AND proposal_id <> 0
      ),
      proposal_meta AS (
        SELECT
          proposal_id,
          project_id,
          MAX(CASE WHEN field = 'name' AND rn = 1 THEN new_value END) AS name,
          MAX(CASE WHEN field = 'description' AND rn = 1 THEN new_value END) AS description,
          MAX(CASE WHEN field = 'metadata' AND rn = 1 THEN new_value END) AS metadata,
          MAX(CASE WHEN field = 'options' AND rn = 1 THEN new_value END) AS options,
          MAX(CASE WHEN field = 'payouts' AND rn = 1 THEN new_value END) AS payouts,
          MAX(CASE WHEN field = 'outcomeMeta' AND rn = 1 THEN new_value END) AS outcome_meta,
          MAX(CASE WHEN field = 'durationHours' AND rn = 1 THEN new_value END) AS duration_hours,
          MAX(CASE WHEN field = 'url' AND rn = 1 THEN new_value END) AS url
        FROM proposal_meta_ranked
        GROUP BY proposal_id, project_id
      ),
      state_ranked AS (
        SELECT
          proposal_id,
          state,
          indexer_block_height,
          ROW_NUMBER() OVER (
            PARTITION BY proposal_id
            ORDER BY indexer_block_height DESC
          ) AS rn
        FROM okinoko_dao_proposal_state_events
      ),
      state AS (
        SELECT
          proposal_id,
          state,
          indexer_block_height AS state_block
        FROM state_ranked
        WHERE rn = 1
      ),
      ready_ranked AS (
        SELECT
          project_id,
          proposal_id,
          ready_at,
          indexer_block_height,
          ROW_NUMBER() OVER (
            PARTITION BY proposal_id
            ORDER BY indexer_block_height DESC
          ) AS rn
        FROM okinoko_dao_proposal_ready_events
      ),
      ready AS (
        SELECT
          project_id,
          proposal_id,
          ready_at,
          indexer_block_height AS ready_block
        FROM ready_ranked
        WHERE rn = 1
      ),
      result_ranked AS (
        SELECT
          project_id,
          proposal_id,
          result,
          indexer_block_height,
          ROW_NUMBER() OVER (
            PARTITION BY proposal_id
            ORDER BY indexer_block_height DESC
          ) AS rn
        FROM okinoko_dao_proposal_result_events
      ),
      result AS (
        SELECT
          project_id,
          proposal_id,
          result,
          indexer_block_height AS result_block
        FROM result_ranked
        WHERE rn = 1
      )
      SELECT
        COALESCE(ready.project_id, result.project_id, c.project_id) AS project_id,
        c.proposal_id,
        c.created_by,
        c.created_block,
        COALESCE(pm.name, c.name) AS name,
        COALESCE(pm.description, c.description) AS description,
        COALESCE(pm.metadata, c.metadata) AS metadata,
        COALESCE(pm.options, c.options) AS options,
        COALESCE(pm.payouts, c.payouts) AS payouts,
        COALESCE(pm.outcome_meta, c.outcome_meta) AS outcome_meta,
        COALESCE(NULLIF(pm.duration_hours, '')::numeric, c.duration_hours) AS duration_hours,
        c.is_poll,
        state.state,
        state.state_block,
        ready.ready_at,
        ready.ready_block,
        result.result,
        result.result_block, 
        COALESCE(pm.url, c.url) AS url
      FROM creation c
      LEFT JOIN state ON c.proposal_id = state.proposal_id
      LEFT JOIN ready ON c.proposal_id = ready.proposal_id
      LEFT JOIN result ON c.proposal_id = result.proposal_id
      LEFT JOIN proposal_meta pm ON c.proposal_id = pm.proposal_id;

