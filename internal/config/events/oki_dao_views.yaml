# ================================
# Database Views
# ================================
# Each entry defines a Postgres view to be created or updated.
# Fields:
#   - name: SQL view name (≤ 63 chars).
#   - sql:  Full CREATE OR REPLACE VIEW statement.
#
# Best practice:
#   - Prefix view names with contract slug to avoid collisions.
#   - Reference the event tables created in mappings.yaml.

# ================================
# Database Views for Okinoko DAO Indexer
# ================================

