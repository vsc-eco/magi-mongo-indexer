# ===============================
# BTC MAPPING CONTRACT - STATIC MAPPING
# ===============================
#
# The BTC mapping contract has a known address. Events are CSV format
# with "|" delimiter and "=" key separator.
# ===============================

contracts:
  - address: "vsc1BdrQ6EtbQ64rq2PkPd21x4MaLnVRcJj85d"
    events:
      # Deposit Events - BTC deposited and credited to VSC account
      - log_type: "dep"
        table: "btc_mapping_deposit_events"
        schema:
          recipient: string
          sender: string
          amount: numeric
        parse: "csv"
        delimiter: "|"
        key_delimiter: "="
        fields:
          recipient: "1"
          sender: "2"
          amount: "3"

      # Map Events - same as deposit, alternate log type
      - log_type: "map"
        table: "btc_mapping_deposit_events"
        schema:
          recipient: string
          sender: string
          amount: numeric
        parse: "csv"
        delimiter: "|"
        key_delimiter: "="
        fields:
          recipient: "1"
          sender: "2"
          amount: "3"

      # Fee Events - fees charged on unmap
      - log_type: "fee"
        table: "btc_mapping_fee_events"
        schema:
          magi_fee: numeric
          btc_fee: numeric
        parse: "csv"
        delimiter: "|"
        key_delimiter: "="
        fields:
          magi_fee: "1"
          btc_fee: "2"

      # Transfer Events - BTC transferred between accounts
      - log_type: "xfer"
        table: "btc_mapping_transfer_events"
        schema:
          from_addr: string
          to_addr: string
          amount: numeric
        parse: "csv"
        delimiter: "|"
        key_delimiter: "="
        fields:
          from_addr: "1"
          to_addr: "2"
          amount: "3"

      # Unmap Events - BTC withdrawal initiated
      - log_type: "unm"
        table: "btc_mapping_unmap_events"
        schema:
          tx_id: string
          from_addr: string
          deducted: numeric
          sent: numeric
        parse: "csv"
        delimiter: "|"
        key_delimiter: "="
        fields:
          tx_id: "1"
          from_addr: "2"
          deducted: "3"
          sent: "4"

      - log_type: "unmap"
        table: "btc_mapping_unmap_events"
        schema:
          tx_id: string
          from_addr: string
          to_addr: string
          deducted: numeric
          sent: numeric
        parse: "csv"
        delimiter: "|"
        key_delimiter: "="
        fields:
          tx_id: "1"
          from_addr: "2"
          to_addr: "3"
          deducted: "4"
          sent: "5"
