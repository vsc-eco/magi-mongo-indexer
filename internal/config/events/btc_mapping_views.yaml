# ===============================
# BTC MAPPING VIEWS
# ===============================

views:
  # Total BTC mapped (deposits - unmaps by fee amounts)
  - name: btc_mapping_stats
    sql: |
      CREATE OR REPLACE VIEW btc_mapping_stats AS
      SELECT
        COUNT(*) AS total_deposits,
        COALESCE(SUM(amount), 0) AS total_deposited_sats,
        (SELECT COUNT(*) FROM btc_mapping_unmap_events) AS total_unmaps,
        (SELECT COALESCE(SUM(magi_fee), 0) FROM btc_mapping_fee_events) AS total_magi_fees,
        (SELECT COALESCE(SUM(btc_fee), 0) FROM btc_mapping_fee_events) AS total_btc_fees
      FROM btc_mapping_deposit_events;

  # Recent deposits
  - name: btc_mapping_recent_deposits
    sql: |
      CREATE OR REPLACE VIEW btc_mapping_recent_deposits AS
      SELECT
        recipient,
        sender,
        amount,
        indexer_tx_hash AS tx_hash,
        indexer_block_height AS block_height,
        indexer_ts AS ts
      FROM btc_mapping_deposit_events
      ORDER BY indexer_block_height DESC
      LIMIT 50;

  # Deposit volume - 24h
  - name: btc_mapping_volume_24h
    sql: |
      CREATE OR REPLACE VIEW btc_mapping_volume_24h AS
      SELECT
        COUNT(*) AS deposit_count,
        COALESCE(SUM(amount), 0) AS total_sats
      FROM btc_mapping_deposit_events
      WHERE indexer_ts > NOW() - INTERVAL '24 hours';

  # Deposit volume - 7d
  - name: btc_mapping_volume_7d
    sql: |
      CREATE OR REPLACE VIEW btc_mapping_volume_7d AS
      SELECT
        COUNT(*) AS deposit_count,
        COALESCE(SUM(amount), 0) AS total_sats
      FROM btc_mapping_deposit_events
      WHERE indexer_ts > NOW() - INTERVAL '7 days';

  # Deposit volume - 30d
  - name: btc_mapping_volume_30d
    sql: |
      CREATE OR REPLACE VIEW btc_mapping_volume_30d AS
      SELECT
        COUNT(*) AS deposit_count,
        COALESCE(SUM(amount), 0) AS total_sats
      FROM btc_mapping_deposit_events
      WHERE indexer_ts > NOW() - INTERVAL '30 days';

  # BTC balance per account (deposits + transfers_in - transfers_out - unmaps)
  - name: btc_mapping_balances
    sql: |
      CREATE OR REPLACE VIEW btc_mapping_balances AS
      WITH deposits AS (
        SELECT recipient AS account, COALESCE(SUM(amount), 0) AS total
        FROM btc_mapping_deposit_events GROUP BY recipient
      ),
      xfer_in AS (
        SELECT to_addr AS account, COALESCE(SUM(amount), 0) AS total
        FROM btc_mapping_transfer_events GROUP BY to_addr
      ),
      xfer_out AS (
        SELECT from_addr AS account, COALESCE(SUM(amount), 0) AS total
        FROM btc_mapping_transfer_events GROUP BY from_addr
      ),
      unmaps AS (
        SELECT from_addr AS account, COALESCE(SUM(deducted), 0) AS total
        FROM btc_mapping_unmap_events GROUP BY from_addr
      ),
      all_accounts AS (
        SELECT account FROM deposits UNION
        SELECT account FROM xfer_in UNION
        SELECT account FROM xfer_out UNION
        SELECT account FROM unmaps
      )
      SELECT
        a.account,
        COALESCE(d.total, 0) + COALESCE(xi.total, 0)
        - COALESCE(xo.total, 0) - COALESCE(u.total, 0) AS balance_sats
      FROM all_accounts a
      LEFT JOIN deposits d ON a.account = d.account
      LEFT JOIN xfer_in xi ON a.account = xi.account
      LEFT JOIN xfer_out xo ON a.account = xo.account
      LEFT JOIN unmaps u ON a.account = u.account;
