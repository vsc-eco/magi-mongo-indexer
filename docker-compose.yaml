services:
  # ================================
  # PostgreSQL database
  # ================================
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: indexer          # Main DB user for indexer
      POSTGRES_PASSWORD: indexerpass
      POSTGRES_DB: indexerdb
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      # Mount init scripts for creating extra roles (e.g., gql_reader)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer -d indexerdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ================================
  # Hasura GraphQL Engine
  # ================================
  hasura:
    image: hasura/graphql-engine:v2.42.0
    restart: always
    ports:
      - "8081:8080"                   # UI/API exposed on localhost:8081
    environment:
      # Hasura internal metadata DB (full rights)
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgres://indexer:indexerpass@postgres:5432/indexerdb

      # User-facing DB connection (read-only user recommended)
      HASURA_GRAPHQL_DATABASE_URL: postgres://gql_reader:readonlypass@postgres:5432/indexerdb

      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"   # Enable web console
      HASURA_GRAPHQL_DEV_MODE: "true"         # Helpful for hot reload / debugging
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET} # From .env

      # public role
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
      
    depends_on:
      postgres:
        condition: service_healthy

  # ================================
  # Magi Mongo Indexer service
  # ================================
  magi-mongo-indexer:
    build: .                          # Build local Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgres://indexer:indexerpass@postgres:5432/indexerdb?sslmode=disable
      MONGO_URI: mongodb://mongo_vsc:27017
      MONGO_DB_NAME: go-vsc
      POLL_INTERVAL_SEC: 5
      HASURA_URL: http://hasura:8080
      HASURA_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET}
      HASURA_SOURCE: default
      MAPPINGS_FILES: /config/events
      VIEWS_FILES: /config/events
    volumes:
      - ./internal/config/events:/config/events
    depends_on:
      postgres:
        condition: service_healthy
      hasura:
        condition: service_healthy
    networks:
      - go-vsc-node   # join go-vsc-node network for MongoDB access
      - default       # still on its own default network for postgres/hasura

networks:
  go-vsc-node:
    external: true
    name: vsc-deployment_go-vsc-node 
